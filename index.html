<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ตัวอย่างหน้า HTML</title>
  <style>
    :root { --bg:#f7f7f8; --card:#fff; --accent:#2563eb; --text:#111; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans',sans-serif; background:var(--bg); color:var(--text); }
    .container{max-width:900px;margin:40px auto;padding:20px;}
    header{display:flex;justify-content:space-between;align-items:center}
    h1{margin:.2rem 0}
    .card{background:var(--card);border-radius:8px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    .btn{background:var(--accent);color:#fff;padding:8px 14px;border:0;border-radius:6px;cursor:pointer}
    footer{margin-top:18px;font-size:.9rem;color:#555}
    @media (max-width:600px){ .container{margin:20px;padding:12px} }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>ยินดีต้อนรับ</h1>
        <p style="margin:0;color:#444">ตัวอย่างหน้า HTML + CSS + JS แบบง่าย</p>
      </div>
      <div>
        <button class="btn" id="actionBtn">คลิกฉัน</button>
      </div>
    </header>

    <main style="margin-top:18px" class="card">
      <h2>ส่วนเนื้อหา</h2>
      <p>นี่เป็นตัวอย่างหน้าเว็บพื้นฐาน — สามารถแก้ข้อความ ปรับสไตล์ หรือเพิ่มฟอร์ม/ตารางได้ตามต้องการ</p>

      <section style="margin-top:12px">
        <label for="name">ชื่อของคุณ:</label><br/>
        <input id="name" type="text" placeholder="พิมพ์ชื่อ..." style="padding:8px;margin-top:6px;border-radius:6px;border:1px solid #ddd;width:100%;max-width:320px"/>
      </section>

      <div id="greeting" style="margin-top:12px;color:#064e3b;font-weight:600"></div>
    </main>

    <footer>
      สร้างโดยคุณ — ต้องการให้ผมเพิ่มหน้าอื่นๆ หรือเชื่อม backend ไหม?
    </footer>
  </div>

  <script>
    const btn = document.getElementById('actionBtn');
    const nameInput = document.getElementById('name');
    const greeting = document.getElementById('greeting');

    btn.addEventListener('click', () => {
      const name = nameInput.value.trim() || 'เพื่อน';
      greeting.textContent = `สวัสดี ${name} 👋 ยินดีที่ได้รู้จัก!`;
    });
  </script>
</body>
</html>
